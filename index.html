<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Absences — Synergie BTP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3248;
    --accent:#f97316;--accent2:#fb923c;--text:#f0f2ff;--text2:#8b90b0;
    --text3:#565b7a;--success:#22c55e;--error:#ef4444;--info:#3b82f6;
    --warn:#eab308;--radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;
    display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
  .logo{width:38px;height:38px;background:var(--accent);border-radius:10px;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:white;flex-shrink:0;}
  .header-text h1{font-size:16px;font-weight:600;}
  .header-text p{font-size:12px;color:var(--text2);margin-top:1px;}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
  .month-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;
    padding:4px 12px;font-size:12px;color:var(--accent);font-weight:500;font-family:'DM Mono',monospace;}
  .sync-btn{background:none;border:1px solid var(--border);border-radius:8px;
    color:var(--text2);padding:5px 10px;font-size:13px;cursor:pointer;transition:all 0.15s;}
  .sync-btn:active{border-color:var(--accent);color:var(--accent);}
  .sync-btn.spinning{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .main{padding:20px 16px 120px;max-width:600px;margin:0 auto;}
  .section-title{font-size:11px;font-weight:600;letter-spacing:1.2px;
    text-transform:uppercase;color:var(--text3);margin:24px 0 10px;}
  .card{background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .field-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:6px;display:block;}

  select,input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;
    font-size:15px;padding:12px 14px;outline:none;appearance:none;-webkit-appearance:none;
    transition:border-color 0.15s;}
  select:focus,input[type="text"]:focus{border-color:var(--accent);}
  select option{background:#1a1d27;}
  .select-wrap{position:relative;}
  .select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;
    transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:13px;}
  .date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
  .date-field label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:6px;display:block;}
  input[type="date"]{width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text);font-family:'DM Mono',monospace;
    font-size:14px;padding:11px 12px;outline:none;appearance:none;-webkit-appearance:none;
    transition:border-color 0.15s;color-scheme:dark;}
  input[type="date"]:focus{border-color:var(--accent);}

  /* Banner local storage */
  .local-banner{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);
    border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:#86efac;
    margin-bottom:12px;display:flex;align-items:center;gap:8px;}

  /* Tabs */
  .tabs{display:flex;gap:5px;margin-bottom:12px;}
  .tab{flex:1;padding:8px 4px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
    font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);
    background:var(--surface2);color:var(--text2);transition:all 0.15s;text-align:center;}
  .tab.active{background:var(--accent);border-color:var(--accent);color:white;}
  .tab .badge{display:inline-block;background:rgba(255,255,255,0.25);border-radius:10px;
    padding:1px 6px;font-size:10px;margin-left:3px;}
  .tab:not(.active) .badge{background:var(--surface);color:var(--text3);}

  .sync-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);margin-bottom:10px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
  .sync-dot.ok{background:var(--success);}
  .sync-dot.busy{background:var(--accent);animation:pulse 1s infinite;}
  .sync-dot.err{background:var(--error);}
  .sync-dot.local{background:var(--warn);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  #absence-list,#absence-list-prev,#absence-list-prev2{display:flex;flex-direction:column;gap:8px;}
  .absence-item{background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:12px 14px;
    display:flex;align-items:center;gap:10px;animation:slideIn 0.2s ease;}
  .absence-item.prev-month{border-left:3px solid var(--info);}
  .absence-item.prev2-month{border-left:3px solid var(--warn);}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .absence-item .name{font-weight:600;font-size:14px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .absence-item .dates{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;white-space:nowrap;}
  .absence-item .motif-tag{font-size:11px;color:var(--accent2);background:rgba(251,146,60,0.12);
    border-radius:4px;padding:2px 7px;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;}
  .btn-remove{background:none;border:none;color:var(--text3);cursor:pointer;
    font-size:16px;padding:2px 4px;border-radius:4px;transition:color 0.15s;flex-shrink:0;}
  .btn-remove:hover{color:var(--error);}
  .empty-state{text-align:center;padding:28px;color:var(--text3);font-size:14px;}
  .empty-state .icon{font-size:28px;margin-bottom:8px;}

  .readonly-notice{display:flex;align-items:center;gap:8px;
    border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;margin-bottom:12px;}
  .readonly-notice.blue{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);color:#93c5fd;}
  .readonly-notice.yellow{background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.3);color:#fde047;}

  .btn-add{width:100%;background:var(--accent);border:none;border-radius:var(--radius-sm);
    color:white;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;
    padding:14px;cursor:pointer;margin-top:14px;transition:background 0.15s,transform 0.1s;
    display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-add:active{transform:scale(0.98);}
  .btn-add:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;}

  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
    border-top:1px solid var(--border);padding:10px 16px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));
    display:flex;gap:8px;max-width:600px;margin:0 auto;}
  .btn-preview{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
    color:var(--text);font-family:'DM Sans',sans-serif;font-weight:500;
    font-size:14px;padding:13px 14px;cursor:pointer;white-space:nowrap;}
  .btn-send{flex:1;background:var(--accent);border:none;border-radius:var(--radius-sm);
    color:white;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;
    padding:13px;cursor:pointer;transition:background 0.15s,transform 0.1s;
    display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-send:active{transform:scale(0.98);}
  .btn-send:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;}

  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 20px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;
    z-index:999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.4);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.success{border-color:var(--success);}
  .toast.error{border-color:var(--error);}
  .toast.info{border-color:var(--info);}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);
    z-index:200;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;border:1px solid var(--border);
    border-bottom:none;padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    width:100%;max-width:600px;max-height:85vh;overflow-y:auto;animation:slideUp 0.25s ease;}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
  .modal h2{font-size:16px;font-weight:600;margin-bottom:16px;}

  .pdf-preview{background:white;border-radius:var(--radius-sm);padding:20px;color:#1a1a2e;}
  .pdf-preview h3{font-size:13px;color:#1F4E79;border-bottom:2px solid #f97316;padding-bottom:6px;margin:14px 0 8px;}
  .pdf-preview h3:first-child{margin-top:0;}
  .pdf-preview h3.prev1{color:#2563eb;border-bottom-color:#3b82f6;}
  .pdf-preview h3.prev2{color:#b45309;border-bottom-color:#eab308;}
  .pdf-preview .meta{font-size:11px;color:#666;margin-bottom:14px;}
  .pdf-preview table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
  .pdf-preview th{background:#1F4E79;color:white;padding:7px 8px;text-align:left;}
  .pdf-preview td{padding:6px 8px;border-bottom:1px solid #e5e7eb;}
  .pdf-preview tr:nth-child(even) td{background:#f8f9fa;}

  .modal-actions{display:flex;gap:10px;margin-top:16px;}
  .btn-modal{flex:1;padding:13px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
    font-weight:600;font-size:14px;cursor:pointer;border:none;}
  .btn-modal.primary{background:var(--accent);color:white;}
  .btn-modal.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}

  .loader-overlay{display:none;position:fixed;inset:0;background:rgba(15,17,23,0.7);
    z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
  .loader-overlay.open{display:flex;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  .loader-msg{font-size:14px;color:var(--text2);}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="loader-overlay" id="loader">

<header class="header">
  <div class="logo">SB</div>
  <div class="header-text">

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const SCRIPT_URL          = "https://script.google.com/macros/s/AKfycbwC_P389igdawx1e8HA4ZZZYIsc6iHdap2vaDqM4F0NQZ73z88l0NC67X2ftZ038R7Z/exec";
const EMAILJS_PUBLIC_KEY  = "9cpxDjEG1jXr_0dcv";
const EMAILJS_SERVICE_ID  = "service_bvmanla";
const EMAILJS_TEMPLATE_ID = "template_lky1ji7";
const DEST_EMAILS         = ["synergiebtp971@gmail.com", "mk.synergiebtp@gmail.com"];
const LS_KEY              = "synergie_absences_v1"; // clé localStorage

// ══════════════════════════════════════════════
//  DATES — 3 mois
// ══════════════════════════════════════════════
const now   = new Date();
const YEAR  = now.getFullYear();
const MONTH = now.getMonth();
const MONTHS_FR = ["Janvier","Février","Mars","Avril","Mai","Juin",
                   "Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

function mkKey(y,m){ return `${y}-${String(m+1).padStart(2,'0')}`; }
function mkLab(y,m){ return MONTHS_FR[m]+" "+y; }

const d0 = new Date(YEAR,MONTH,1),   key0=mkKey(d0.getFullYear(),d0.getMonth()),   lab0=mkLab(d0.getFullYear(),d0.getMonth());
const d1 = new Date(YEAR,MONTH-1,1), key1=mkKey(d1.getFullYear(),d1.getMonth()),   lab1=mkLab(d1.getFullYear(),d1.getMonth());
const d2 = new Date(YEAR,MONTH-2,1), key2=mkKey(d2.getFullYear(),d2.getMonth()),   lab2=mkLab(d2.getFullYear(),d2.getMonth());

document.getElementById("month-badge").textContent     = lab0;
document.getElementById("tab-m-label").textContent     = lab0;
document.getElementById("tab-prev-label").textContent  = lab1;
document.getElementById("tab-prev2-label").textContent = lab2;

const minDate = new Date(YEAR,MONTH,1).toISOString().split("T")[0];
const maxDate = new Date(YEAR,MONTH+1,0).toISOString().split("T")[0];
const duEl = document.getElementById("date-du");
const auEl = document.getElementById("date-au");
duEl.min=auEl.min=minDate; duEl.max=auEl.max=maxDate;
duEl.value=auEl.value=minDate;
duEl.addEventListener("change",function(){
  if(auEl.value<this.value) auEl.value=this.value;
  auEl.min=this.value;
});

// ══════════════════════════════════════════════
//  ÉTAT en mémoire
// ══════════════════════════════════════════════
let abs0=[], abs1=[], abs2=[];

// ══════════════════════════════════════════════
//  LOCAL STORAGE — sauvegarde & restauration
//  On stocke TOUTES les absences des 3 mois
// ══════════════════════════════════════════════
function saveLocal(allData) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(allData));
  } catch(e) { /* quota exceeded — on ignore */ }
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function applyData(allData) {
  abs0 = allData.filter(r => r.mois === key0);
  abs1 = allData.filter(r => r.mois === key1);
  abs2 = allData.filter(r => r.mois === key2);
  renderAll();
}

// ══════════════════════════════════════════════
//  INIT — affiche le localStorage immédiatement
//          puis tente la synchro Google Sheets
// ══════════════════════════════════════════════
window.addEventListener("load", () => {
  // ① Affichage immédiat depuis localStorage
  const local = loadLocal();
  if (local.length > 0) {
    applyData(local);
    setSyncStatus("local", "Données locales chargées — synchro en cours…");
  } else {
    setSyncStatus("busy", "Chargement…");
    renderAll(); // affiche "aucune absence" en attendant
  }

  // ② Synchro Google Sheets en arrière-plan
  syncFromSheet(true);
});

// ══════════════════════════════════════════════
//  SYNCHRO Google Sheets (lecture)
// ══════════════════════════════════════════════
async function syncFromSheet(silent=false) {
  if(!SCRIPT_URL || !SCRIPT_URL.startsWith("https://")) {
    setSyncStatus("err","Google Sheet non configuré");
    return;
  }
  setSyncStatus("busy","Synchronisation…");
  document.getElementById("sync-btn").classList.add("spinning");
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=get`);
    const data = await res.json();

    // Google Sheets est la source de vérité : on écrase le localStorage
    saveLocal(data);
    applyData(data);

    const t = new Date();
    setSyncStatus("ok",`Synchronisé à ${t.getHours()}h${String(t.getMinutes()).padStart(2,'0')}`);
    if(!silent) showToast("✅ Données synchronisées","success");
  } catch(e) {
    setSyncStatus("err","Hors ligne — données locales affichées");
    if(!silent) showToast("⚠️ Synchro impossible, données locales affichées","info");
  }
  document.getElementById("sync-btn").classList.remove("spinning");
}

// ══════════════════════════════════════════════
//  GOOGLE SHEET — écriture / suppression
// ══════════════════════════════════════════════
async function writeToSheet(absence) {
  const res = await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"add",data:absence})});
  return res.json();
}
async function deleteFromSheet(id) {
  const res = await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"delete",id})});
  return res.json();
}

// ══════════════════════════════════════════════
//  AJOUTER une absence
// ══════════════════════════════════════════════
async function addAbsence() {
  const salarie = document.getElementById("salarie-select").value;
  const du      = duEl.value;
  const au      = auEl.value;
  const motif   = document.getElementById("motif").value.trim();
  if(!salarie) { showToast("⚠️ Sélectionner un salarié","error"); return; }
  if(!du||!au) { showToast("⚠️ Renseigner les dates","error"); return; }
  if(au<du)    { showToast("⚠️ Date de fin avant le début","error"); return; }

  document.getElementById("btn-add").disabled=true;
  showLoader("Enregistrement…");

  const absence = {
    id:       Date.now().toString(),
    mois:     key0,
    salarie, du, au,
    motif:    motif||"—",
    saisi_le: new Date().toLocaleDateString("fr-FR"),
  };

  // ① Sauvegarde locale immédiate
  abs0.push(absence);
  const allData = [...abs0,...abs1,...abs2];
  saveLocal(allData);
  renderAll();
  showToast("✅ Absence enregistrée !","success");

  // ② Envoi Google Sheets en arrière-plan
  try {
    await writeToSheet(absence);
    setSyncStatus("ok",`Sauvegardé à ${new Date().getHours()}h${String(new Date().getMinutes()).padStart(2,'0')}`);
  } catch(e) {
    setSyncStatus("local","Sauvegardé localement — synchro en attente");
  }

  document.getElementById("salarie-select").value="";
  document.getElementById("motif").value="";
  hideLoader();
  document.getElementById("btn-add").disabled=false;
}

// ══════════════════════════════════════════════
//  SUPPRIMER une absence
// ══════════════════════════════════════════════
async function removeAbsence(id) {
  showLoader("Suppression…");

  // ① Suppression locale immédiate
  abs0 = abs0.filter(a=>a.id!==id);
  const allData = [...abs0,...abs1,...abs2];
  saveLocal(allData);
  renderAll();
  showToast("🗑 Absence supprimée","info");

  // ② Suppression Google Sheets en arrière-plan
  try {
    await deleteFromSheet(id);
  } catch(e) {
    setSyncStatus("local","Supprimé localement — synchro en attente");
  }
  hideLoader();
}

// ══════════════════════════════════════════════
//  ONGLETS
// ══════════════════════════════════════════════
function switchTab(tab) {
  ["m","prev","prev2"].forEach(t=>{
    document.getElementById(`tab-${t}`).classList.toggle("active",t===tab);
    document.getElementById(`panel-${t}`).style.display=t===tab?"":"none";
  });
  document.getElementById("saisie-block").style.display=tab==="m"?"":"none";
}

// ══════════════════════════════════════════════
//  RENDU
// ══════════════════════════════════════════════
function fmt(d){
  if(!d) return"—";
  const [y,m,j]=d.split("-");
  return `${j}/${m}/${y}`;
}

function renderSection(id, data, canDelete, extraClass="") {
  const el=document.getElementById(id);
  if(!data.length){
    el.innerHTML=`<div class="empty-state"><div class="icon">📋</div>Aucune absence enregistrée</div>`;
    return;
  }
  el.innerHTML=data.map(a=>`
    <div class="absence-item ${extraClass}">
      <div class="name">${a.salarie}</div>
      <div class="dates">${fmt(a.du)} → ${fmt(a.au)}</div>
      <div class="motif-tag">${a.motif}</div>
      ${canDelete?`<button class="btn-remove" onclick="removeAbsence('${a.id}')">✕</button>`:""}
    </div>`).join("");
}

function renderAll(){
  document.getElementById("badge-m").textContent     = abs0.length;
  document.getElementById("badge-prev").textContent  = abs1.length;
  document.getElementById("badge-prev2").textContent = abs2.length;
  document.getElementById("btn-send").disabled       = (abs0.length+abs1.length+abs2.length)===0;
  renderSection("absence-list",       abs0, true,  "");
  renderSection("absence-list-prev",  abs1, false, "prev-month");
  renderSection("absence-list-prev2", abs2, false, "prev2-month");
}

// ══════════════════════════════════════════════
//  APERÇU
// ══════════════════════════════════════════════
function buildTable(list){
  if(!list.length) return`<p style="color:#9ca3af;font-size:12px;margin-bottom:8px">Aucune absence</p>`;
  return`<table><thead><tr><th>Salarié</th><th>Du</th><th>Au</th><th>Motif</th></tr></thead>
    <tbody>${list.map(a=>`<tr><td>${a.salarie}</td>
      <td style="text-align:center">${fmt(a.du)}</td>
      <td style="text-align:center">${fmt(a.au)}</td>
      <td>${a.motif}</td></tr>`).join("")}</tbody></table>`;
}

function openPreview(){
  if(!abs0.length&&!abs1.length&&!abs2.length){showToast("⚠️ Aucune absence","error");return;}
  const today=new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});
  document.getElementById("pdf-preview-content").innerHTML=`
    <div class="pdf-preview">
      <p class="meta">Généré le ${today} · ${lab0}:${abs0.length} · ${lab1}:${abs1.length} · ${lab2}:${abs2.length}</p>
      <h3>${lab0} — ${abs0.length} absence(s)</h3>${buildTable(abs0)}
      <h3 class="prev1">${lab1} — ${abs1.length} absence(s)</h3>${buildTable(abs1)}
      <h3 class="prev2">${lab2} — ${abs2.length} absence(s)</h3>${buildTable(abs2)}
    </div>`;
  document.getElementById("modal-title").textContent=`${lab0} / ${lab1} / ${lab2}`;
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal(e){
  if(e.target===document.getElementById("modal-overlay"))
    document.getElementById("modal-overlay").classList.remove("open");
}

// ══════════════════════════════════════════════
//  ENVOI EMAIL
// ══════════════════════════════════════════════
async function sendReport(){
  if(!abs0.length&&!abs1.length&&!abs2.length){showToast("⚠️ Aucune absence","error");return;}
  document.getElementById("btn-send").disabled=true;
  showLoader("Envoi en cours…");

  const buildListe=(list,label)=>{
    if(!list.length) return`${label} : aucune absence\n`;
    return`${label} (${list.length}) :\n`+
      list.map(a=>`  • ${a.salarie} : du ${fmt(a.du)} au ${fmt(a.au)} — ${a.motif}`).join("\n")+"\n";
  };

  const today=new Date().toLocaleDateString("fr-FR");
  const payload={
    subject:        `Absences ${lab0} / ${lab1} / ${lab2} — Synergie BTP`,
    month:          `${lab0} / ${lab1} / ${lab2}`,
    date_envoi:     today,
    nb_absences:    `${abs0.length} (M) + ${abs1.length} (M-1) + ${abs2.length} (M-2)`,
    liste_absences: buildListe(abs0,lab0)+"\n"+buildListe(abs1,lab1)+"\n"+buildListe(abs2,lab2),
  };

  const results = await Promise.allSettled(
    DEST_EMAILS.map(email=>
      emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID,
        {...payload, to_email:email}, EMAILJS_PUBLIC_KEY)
    )
  );

  const ok = results.filter(r=>r.status==="fulfilled").length;
  hideLoader();
  document.getElementById("btn-send").disabled=false;

  if(ok===DEST_EMAILS.length)     showToast(`✅ Récap envoyé aux ${DEST_EMAILS.length} destinataires !`,"success");
  else if(ok>0)                   showToast(`⚠️ Envoyé à ${ok}/${DEST_EMAILS.length} destinataires`,"info");
  else                            showToast("❌ Échec de l'envoi","error");
}

// ══════════════════════════════════════════════
//  HELPERS UI
// ══════════════════════════════════════════════
function setSyncStatus(state,msg){
  document.getElementById("sync-dot").className="sync-dot "+state;
  document.getElementById("sync-label").textContent=msg;
}
function showLoader(msg){
  document.getElementById("loader-msg").textContent=msg;
  document.getElementById("loader").classList.add("open");
}
function hideLoader(){document.getElementById("loader").classList.remove("open");}
function showToast(msg,type=""){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast show "+type;
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.className="toast",3200);
}
</script>
